<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
     <style>
        .a{
          display:flex;
          background-color: antiquewhite;
          justify-content: center;
          flex-direction: row;
          border-radius: 10px;


        }
        .a div{
            border-radius: 50px;
            width: 800px;
            height: 40px;
            padding: 2px;
            font-family: Cambria;
            margin: 3px;
            text-align:center;
            background-color:rgb(205, 82, 82);


        }
        .a :hover{
           background-color:antiquewhite;
           font-family:cursive;
        }
        .b{
          display:flex;
          background-color:antiquewhite ;
          justify-content: center;
          flex-direction: row;
          border-radius: 10px;
        }
          .b div{
            border-radius: 5px;
            width: 800px;
            height: 40px;
            padding: 2px;
            font-family: Cambria;
            margin: 3px;
            text-align:center;
            background-color:antiquewhite;


        }
        .b :hover{
           background-color:rgb(205, 82, 82);
           font-family:cursive;
        }
     </style>
</head>
<body>
       <h1 style="text-align: center;"> FLEX & GRID LAYOUT</h1>
       <div class="a">
        <div>flex 1</div>
        <div>flex 2</div>
        <div>flex 3</div>
       </div>
       <br>
       <div class="b">
        <div>Grid 1</div>
        <div>Grid 2</div>
        <div>Grid 3</div>
       </div>
</body>
</html>
